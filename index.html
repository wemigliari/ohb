<script>
$(document).ready(function(){
    var selectedProduct = getUrlParameter("product");
    $('sel').val(selectedProduct);
});

function getUrlParameter(sParam){

        var sPageURL = window.location.search.substring(1);
        var sURLVariables = sPageURL.split('&');
        for (var i = 0; i < sURLVariables.length; i++)
        {
            var sParameterName = sURLVariables[i].split('=');
            if (sParameterName[0] == sParam)
            {
                return sParameterName[1];
            }
        }


}

$(document).ready(function(){

  //hides dropdown content
  $(".size_chart").hide();

  //unhides first option content
  $("#jellyfish").show();

  //listen to dropdown for change
  $("#size_select").change(function(){
    //rehide content on change
  $('.size_chart').hide();
    //unhides current item
  $('#'+$(this).val()).show();
  });

});
</script>

<div class="container">

<div class="col-md-3">
<div class="row">
<div class="duration form-group">

</div>

         <optgroup label="Àrea Metropolitana de Barcelona">
           <option disabled selected value> -- Selecciona un index -- </option>
           <option value="https://datawrapper.dwcdn.net/hTm5X/5/">Index parc d'habitatges (quantitatius)</option>

           <option value="https://datawrapper.dwcdn.net/lZEur/6/">Index persones i llars (quantitatius)</option>
           <option value="https://datawrapper.dwcdn.net/hTm5X/5/">Index parc d'habitatges (quantitatius)</option>
           <option value="https://datawrapper.dwcdn.net/lZEur/6/">Index problemes d'accés i permanència (quantitatius)</option>
